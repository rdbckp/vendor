name: Build update-binary (ARM32 Android 11) - FIXED

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build python3 \
            libssl-dev pkg-config \
            brotli libbrotli-dev zlib1g-dev

      - name: Setup Android NDK (r23b)
        run: |
          # Pake r23b biar gak kena error 'android_fdsan_create_owner_tag'
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip
          echo "NDK=${{ github.workspace }}/android-ndk-r23b" >> $GITHUB_ENV

      - name: Clone AOSP Repositories
        run: |
          # Clone semua repo yang dibutuhin buat compile
          git clone --depth=1 --branch android-11.0.0_r48 https://android.googlesource.com/platform/bootable/recovery recovery
          git clone --depth=1 --branch android-11.0.0_r48 https://android.googlesource.com/platform/system/core core
          git clone --depth=1 --branch android-11.0.0_r48 https://android.googlesource.com/platform/system/logging logging
          git clone --depth=1 --branch android-11.0.0_r48 https://android.googlesource.com/platform/system/libbase libbase
          git clone --depth=1 --branch android-11.0.0_r48 https://android.googlesource.com/platform/system/libziparchive libziparchive
          git clone --depth=1 --branch android-11.0.0_r48 https://android.googlesource.com/platform/system/extras extras

      - name: Build update-binary
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          # Target armv7a buat Android API 30 (Android 11)
          export CXX=$TOOLCHAIN/bin/armv7a-linux-androideabi30-clang++
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          mkdir -p build_out

          # Analisa Error: 
          # 1. -I recovery: Biar compiler nemu <applypatch/applypatch.h>
          # 2. Source recovery/applypatch/*.cpp: Harus ikut di-compile biar gak missing symbol
          
          $CXX -O2 -std=c++17 -static \
            -DANDROID -DANDROID_API=30 \
            -DRECOVERY_API_VERSION=3 \
            -D_FILE_OFFSET_BITS=64 \
            -I . \
            -I recovery \
            -I recovery/updater/include \
            -I recovery/otautil/include \
            -I core/base/include \
            -I libbase/include \
            -I logging/log/include \
            -I extras/liblp/include \
            -I libziparchive/include \
            recovery/updater/*.cpp \
            recovery/otautil/*.cpp \
            recovery/applypatch/*.cpp \
            core/base/*.cpp \
            -lz -ldl -lc++_static \
            -o build_out/update-binary

          $STRIP build_out/update-binary
          ls -lh build_out/update-binary

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-binary-arm32
          path: build_out/update-binary
