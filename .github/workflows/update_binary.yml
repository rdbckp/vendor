name: Build update-binary (ARM32) - VERSI TUKANG PIJET

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build python3 libssl-dev pkg-config brotli libbrotli-dev zlib1g-dev

      - name: Setup Android NDK (r23b)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip
          echo "NDK=${{ github.workspace }}/android-ndk-r23b" >> $GITHUB_ENV

      - name: Clone Verified AOSP Repos
        run: |
          # Pake r45 karena ini branch "titik temu" yang divalidasi ada
          BRANCH="android-10.0.0_r45"
          URL="https://android.googlesource.com/platform"
          
          # Clone recovery
          git clone --depth=1 --branch $BRANCH $URL/bootable/recovery recovery
          
          # Clone core (di dalemnya udah ada libbase, liblog, libziparchive)
          git clone --depth=1 --branch $BRANCH $URL/system/core core
          
          # Clone extras buat liblp
          git clone --depth=1 --branch $BRANCH $URL/system/extras extras

          # Replikasi folder biar script build gak berubah
          cp -r core/libbase libbase
          cp -r core/liblog logging
          cp -r core/libziparchive libziparchive
          
          ls -d recovery libbase logging core libziparchive extras

      - name: Create Dummy Headers
        run: |
          mkdir -p fake_headers/gtest
          echo "#define FRIEND_TEST(a, b)" > fake_headers/gtest/gtest_prod.h
          touch fake_headers/gtest/gtest.h

      - name: Build update-binary
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export CXX=$TOOLCHAIN/bin/armv7a-linux-androideabi30-clang++
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          mkdir -p build_out

          # Cari file .cpp (Buang test, windows, benchmark, fuzz)
          RECOVERY_SRCS=$(find recovery/updater recovery/otautil recovery/applypatch -name "*.cpp" | grep -v "test" | tr '\n' ' ')
          BASE_SRCS=$(find libbase logging libziparchive -name "*.cpp" -o -name "*.c" | grep -vE "test|benchmark|windows|fuzz" | tr '\n' ' ')
          
          $CXX -O2 -std=c++17 -static \
            -DANDROID -DANDROID_API=30 \
            -DRECOVERY_API_VERSION=3 \
            -I . \
            -I fake_headers \
            -I recovery \
            -I recovery/updater/include \
            -I recovery/otautil/include \
            -I libbase/include \
            -I logging/include \
            -I extras/liblp/include \
            -I libziparchive/include \
            $RECOVERY_SRCS \
            $BASE_SRCS \
            -lz -ldl -lc++_static \
            -o build_out/update-binary

          $STRIP build_out/update-binary
          ls -lh build_out/update-binary

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-binary-pijet
          path: build_out/update-binary
