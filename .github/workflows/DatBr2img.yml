name: Convert Vendor Brotli to IMG

on:
  workflow_dispatch: # Biar bisa diklik manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli python3

      - name: Extract Brotli
        run: |
          # Dekompresi .new.dat.br jadi .new.dat
          brotli -d vendor.new.dat.br -o vendor.new.dat

      - name: Download sdat2img Script
        run: |
          curl -sLo sdat2img.py https://raw.githubusercontent.com/xpirt/sdat2img/master/sdat2img.py

      - name: Convert to IMG
        run: |
          # Format: python3 sdat2img.py <transfer_list> <system_new_dat> [system_img]
          python3 sdat2img.py vendor.transfer.list vendor.new.dat vendor.img

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: vendor.img
          tag_name: convert-${{ github.run_id }}
          name: "Vendor Image Output"
          body: "Hasil convert vendor.new.dat.br ke vendor.img"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
